<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="tileFill" x1="0.18" y1="0.08" x2="0.84" y2="0.94">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#f4f7fd"/>
      <stop offset="100%" stop-color="#e6edf8"/>
    </linearGradient>

    <linearGradient id="tileGloss" x1="0.12" y1="0.08" x2="0.78" y2="0.92">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cloudFill" x1="0.3" y1="0.18" x2="0.78" y2="0.84">
      <stop offset="0%" stop-color="#b49cff"/>
      <stop offset="42%" stop-color="#5a82ff"/>
      <stop offset="100%" stop-color="#2457f3"/>
    </linearGradient>

    <linearGradient id="cloudShine" x1="0.35" y1="0.12" x2="0.68" y2="0.92">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="28%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="chartFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#dfffff"/>
      <stop offset="100%" stop-color="#62e6ff"/>
    </linearGradient>

    <linearGradient id="arrowFill" x1="0.12" y1="0.9" x2="0.92" y2="0.14">
      <stop offset="0%" stop-color="#b3ffff"/>
      <stop offset="58%" stop-color="#ecffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#6b87b5" flood-opacity="0.28"/>
    </filter>

    <filter id="cloudShadow" x="-24%" y="-24%" width="160%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#1e53e8" flood-opacity="0.34"/>
    </filter>

    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#78efff" flood-opacity="0.58"/>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.45"/>
    </filter>

    <mask id="cloudMask">
      <rect width="1024" height="1024" fill="#000"/>
      <ellipse cx="298" cy="555" rx="185" ry="165" fill="#fff"/>
      <ellipse cx="478" cy="404" rx="236" ry="210" fill="#fff"/>
      <ellipse cx="692" cy="469" rx="178" ry="154" fill="#fff"/>
      <ellipse cx="800" cy="610" rx="126" ry="118" fill="#fff"/>
      <ellipse cx="557" cy="646" rx="268" ry="198" fill="#fff"/>
      <rect x="168" y="472" width="682" height="240" rx="120" fill="#fff"/>
    </mask>

  </defs>

  <g filter="url(#tileShadow)">
    <rect x="72" y="72" width="880" height="880" rx="214" fill="url(#tileFill)"/>
    <rect x="72" y="72" width="880" height="880" rx="214" fill="url(#tileGloss)"/>
    <rect x="72" y="72" width="880" height="880" rx="214" fill="none" stroke="#dbe5f4" stroke-width="3"/>
  </g>

  <g filter="url(#cloudShadow)">
    <g mask="url(#cloudMask)">
      <rect x="96" y="174" width="832" height="690" rx="180" fill="url(#cloudFill)"/>
      <rect x="96" y="174" width="832" height="690" rx="180" fill="url(#cloudShine)"/>
      <ellipse cx="359" cy="374" rx="188" ry="142" fill="#ffffff" opacity="0.15"/>
      <ellipse cx="647" cy="710" rx="286" ry="156" fill="#46c8ff" opacity="0.12"/>
    </g>
    <g mask="url(#cloudMask)">
      <rect x="113" y="191" width="798" height="656" rx="168" fill="none" stroke="#89b7ff" stroke-width="8" opacity="0.42"/>
    </g>
  </g>

  <g opacity="0.88">
    <path d="M657 312c43-15 93-14 134 7c41 20 71 57 82 104" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="14" opacity="0.22"/>
  </g>

  <g filter="url(#softGlow)" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <path d="M336 446l88 122l-86 112" fill="none" stroke-width="54"/>
    <path d="M522 621h158" fill="none" stroke-width="52"/>
  </g>

  <g filter="url(#glow)">
    <rect x="618" y="565" width="50" height="108" rx="18" fill="url(#chartFill)" opacity="0.7"/>
    <rect x="681" y="518" width="54" height="155" rx="18" fill="url(#chartFill)" opacity="0.8"/>
    <rect x="748" y="450" width="58" height="223" rx="18" fill="url(#chartFill)" opacity="0.92"/>
  </g>

  <g filter="url(#glow)">
    <path d="M625 365l181-173l71 199l-66-25l-67-75l-76 74z" fill="url(#arrowFill)"/>
  </g>

  <path d="M621 369l179-172l-18 108c-10 60-58 110-119 122z" fill="#ffffff" opacity="0.16"/>
</svg>
